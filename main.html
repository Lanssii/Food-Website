<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Website</title>
    <link rel="stylesheet" href="main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav>
      <div class="container nav-wrapper">
        <div class="nav-info">
          <div class="nav-number">
            <img src="images/phone.png" alt="phone" />
            <span>(414) 857 - 0107</span>
          </div>
          <div class="nav-mail">
            <img src="images/mail.png" alt="mail" />
            <span>yummy@bistrobliss</span>
          </div>
        </div>
        <div class="nav-icons">
          <a href="#"><img src="images/twitter.png" alt="twitter-icon" /></a>
          <a href="#"><img src="images/facebook.png" alt="facebook-icon" /></a>
          <a href="#"
            ><img src="images/instagram.png" alt="instagram-icon"
          /></a>
          <a href="#"><img src="images/github.png" alt="github-icon" /></a>
        </div>
      </div>
    </nav>

    <!-- HEADER -->
    <header>
      <div class="container header-wrapper">
        <div class="shop-name">
          <a href="#"><img src="images/japanese-food.png" alt="shop-logo" /></a>
          <span>Bistro Bliss</span>
        </div>
        <div class="header-nav">
          <a href="#" class="header-nav-active">Home</a>
          <a href="#">About</a>
          <a href="#">Menu</a>
          <a href="#">Pages</a>
          <a href="#">Contact</a>
        </div>
        <div>
          <button class="book-table">Book A Table</button>
        </div>
      </div>
    </header>
  </body>
</html>
